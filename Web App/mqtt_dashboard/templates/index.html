<!DOCTYPE html>
<html>
<head>
    <title>TapBand - Dashboard</title>
</head>
<body>
    <h1>TapBand - Shops Dashboard</h1>

    <h2>Add New Shop</h2>
    <form action="/add_shop" method="post">
        <label>Start Date: <input type="date" name="start_date" required></label><br>
        <label>End Date: <input type="date" name="end_date" required></label><br>
        <button type="submit">Add Shop</button>
    </form>

    <h2>Shops</h2>
    <table border="1">
        <tr>
            <th>Shop Name</th>
            <th>Subscription</th>
            <th>Total Bands</th>
            <th>Online Bands</th>
            <th>Manage</th>
            <th>Delete</th>
        </tr>
        {% for shop in shops %}
        <tr>
            <td>{{ shop.name }}</td>
            <td>{{ shop.start_date }} to {{ shop.end_date }}</td>
            <td>{{ shop.total_bands }}</td>
            <td>{{ shop.online_bands }}</td>
            <td><a href="/shop/{{ shop.id }}">Manage</a></td>
            <td>
                <form action="/delete_shop/{{ shop.id }}" method="post" onsubmit="return confirm('Delete this shop?')">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
