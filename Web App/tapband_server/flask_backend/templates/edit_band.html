{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Edit Band: {{ band.band_id }}</h2>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_band', band_id=band.band_id) }}">
            <div class="mb-3">
                <label for="band_id" class="form-label">Band ID</label>
                <input type="text" class="form-control" id="band_id" name="band_id" value="{{ band.band_id }}" required>
            </div>
            
            <div class="mb-3">
                <label for="shop_id" class="form-label">Shop</label>
                <select class="form-select" id="shop_id" name="shop_id" required>
                    {% for shop in shops %}
                    <option value="{{ shop.id }}" {% if shop.id == band.shop_id %}selected{% endif %}>{{ shop.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if band.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">Active</label>
            </div>
            
            <button type="submit" class="btn btn-primary">Update Band</button>
            <a href="{{ url_for('band_detail', band_id=band.band_id) }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
